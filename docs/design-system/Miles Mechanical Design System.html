document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2 19.5v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2.5 12h2M19.5 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4\"><\u002Fpath><\u002Fsvg>Light<\u002Fbutton>\n    <button onclick=\"{{ setDark }}\" style=\"{{ darkStyle }}\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z\"><\u002Fpath><\u002Fsvg>Dark<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ===================== COVER ===================== -->\n  <header data-screen-label=\"Cover\" style=\"background:var(--c-hero);color:#FFFFFF;padding:72px 64px 64px;position:relative;overflow:hidden;\">\n    <div style=\"position:absolute;top:-120px;right:-80px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(240,100,31,0.22), rgba(240,100,31,0) 62%);\"><\u002Fdiv>\n    <div style=\"position:absolute;bottom:-160px;left:-60px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle at 50% 50%, rgba(92,149,196,0.20), rgba(92,149,196,0) 64%);\"><\u002Fdiv>\n    <div style=\"max-width:1180px;margin:0 auto;position:relative;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:64px;\">\n        <svg width=\"44\" height=\"44\" viewBox=\"0 0 96 96\" fill=\"none\"><rect x=\"2\" y=\"2\" width=\"92\" height=\"92\" rx=\"14\" fill=\"#FFFFFF\"><\u002Frect><polyline points=\"28 68 28 30 48 53\" fill=\"none\" stroke=\"var(--c-primary)\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"48 53 68 30 68 68\" fill=\"none\" stroke=\"#F0641F\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;letter-spacing:0.02em;text-transform:uppercase;line-height:1;\">Miles Mechanical<span style=\"display:block;font-size:11px;font-weight:600;letter-spacing:0.22em;color:#93B8D9;margin-top:4px;\">AC &amp; HEATING<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 18px;font:600 13px/1 'IBM Plex Sans',sans-serif;letter-spacing:0.22em;text-transform:uppercase;color:#F0641F;\">Brand &amp; Design System · Phase 1<\u002Fp>\n      <h1 style=\"margin:0;font-family:'Archivo',sans-serif;font-weight:900;font-size:88px;line-height:0.92;letter-spacing:-0.02em;text-transform:uppercase;max-width:14ch;\">Texans serving Texans.<\u002Fh1>\n      <p style=\"margin:28px 0 0;font-size:20px;line-height:1.55;color:#C6DAEB;max-width:64ch;\">The visual and verbal system for the Miles Mechanical marketing website. One honest, dependable identity — built mobile-first and <strong style=\"color:#fff;\">asset-light<\u002Fstrong>, so the site looks complete even with little or no client photography.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:40px;\">\n        <span style=\"display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border:1px solid rgba(255,255,255,0.22);border-radius:4px;font:600 13px/1 'IBM Plex Sans',sans-serif;\">★ 4.9 Google · 56 reviews<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border:1px solid rgba(255,255,255,0.22);border-radius:4px;font:600 13px/1 'IBM Plex Sans',sans-serif;\">20+ years<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border:1px solid rgba(255,255,255,0.22);border-radius:4px;font:600 13px/1 'IBM Plex Sans',sans-serif;\">Licensed · Insured · AHS-approved<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1180px;margin:0 auto;padding:0 64px 140px;\">\n\n    <!-- Open items + asset-light callouts -->\n    <section style=\"margin-top:48px;display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n      <div style=\"display:flex;gap:16px;align-items:flex-start;background:var(--c-warning-tint);border:1px solid var(--c-border);border-left:4px solid var(--c-warning);border-radius:6px;padding:20px 24px;\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:1px;\"><path d=\"M12 3 1.5 21h21L12 3Z\" stroke=\"var(--c-warning)\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M12 10v4\" stroke=\"var(--c-warning)\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"12\" cy=\"17.5\" r=\"1.1\" fill=\"#C6820B\"><\u002Fcircle><\u002Fsvg>\n        <div>\n          <p style=\"margin:0 0 6px;font:700 14px/1.3 'IBM Plex Sans',sans-serif;color:var(--c-warning);\">Pending owner confirmation<\u002Fp>\n          <p style=\"margin:0;font-size:14px;line-height:1.55;color:var(--c-warning);\">Phone number (two are published), true hours &amp; after-hours policy, and licence numbers are placeholders until reconciled.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;align-items:flex-start;background:var(--c-primary-tint);border:1px solid var(--c-border);border-left:4px solid var(--c-primary);border-radius:6px;padding:20px 24px;\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--c-primary)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px;\"><path d=\"M3 8h11a2.5 2.5 0 1 0-2.5-2.5M3 12h15a3 3 0 1 1-3 3M3 16h9a2 2 0 1 1-2 2\"><\u002Fpath><\u002Fsvg>\n        <div>\n          <p style=\"margin:0 0 6px;font:700 14px/1.3 'IBM Plex Sans',sans-serif;color:var(--c-primary-ink);\">Asset-light by design<\u002Fp>\n          <p style=\"margin:0;font-size:14px;line-height:1.55;color:var(--c-primary-ink);\">Every layout leads with type, the M motif, ratings and credentials — no hero photo, gallery or video required. Imagery is an upgrade, never a dependency.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===================== LOGO ===================== -->\n    <section data-screen-label=\"Logo\" style=\"margin-top:96px;\">\n      <p style=\"margin:0 0 10px;font:600 13px/1 'IBM Plex Sans',sans-serif;letter-spacing:0.18em;text-transform:uppercase;color:var(--c-ember);\">01 — Brand mark<\u002Fp>\n      <h2 style=\"margin:0;font-family:'Archivo',sans-serif;font-weight:800;font-size:52px;line-height:1;letter-spacing:-0.01em;text-transform:uppercase;color:var(--c-ink);\">The M monogram<\u002Fh2>\n      <div style=\"width:64px;height:4px;background:var(--c-ember);border-radius:2px;margin-top:20px;\"><\u002Fdiv>\n      <p style=\"margin:24px 0 0;font-size:18px;line-height:1.6;color:var(--c-body);max-width:68ch;\">A single bold <strong>M<\u002Fstrong> for Miles Mechanical, split into two temperatures — a cool blue stroke for air conditioning and a warm ember stroke for heating. Set in a squared badge that reads sturdy and engineered. It locks up with an Archivo wordmark and the \"AC &amp; Heating\" descriptor.<\u002Fp>\n\n      <!-- Lockups -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px;\">\n        <div style=\"background:var(--c-card);border:1px solid var(--c-border);border-radius:6px;min-height:240px;display:flex;align-items:center;justify-content:center;\">\n          <div style=\"display:flex;align-items:center;gap:18px;\">\n            <svg width=\"84\" height=\"84\" viewBox=\"0 0 96 96\" fill=\"none\"><rect x=\"2\" y=\"2\" width=\"92\" height=\"92\" rx=\"14\" fill=\"#155C93\"><\u002Frect><polyline points=\"28 68 28 30 48 53\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"48 53 68 30 68 68\" fill=\"none\" stroke=\"#F0641F\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg>\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;line-height:0.95;letter-spacing:0.01em;text-transform:uppercase;color:var(--c-ink);\">Miles<br>Mechanical<span style=\"display:block;font-size:12px;font-weight:600;letter-spacing:0.24em;color:var(--c-muted);margin-top:6px;\">AC &amp; HEATING<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--c-hero);border:1px solid var(--c-hero);border-radius:6px;min-height:240px;display:flex;align-items:center;justify-content:center;\">\n          <div style=\"display:flex;align-items:center;gap:18px;\">\n            <svg width=\"84\" height=\"84\" viewBox=\"0 0 96 96\" fill=\"none\"><rect x=\"2\" y=\"2\" width=\"92\" height=\"92\" rx=\"14\" fill=\"#FFFFFF\"><\u002Frect><polyline points=\"28 68 28 30 48 53\" fill=\"none\" stroke=\"var(--c-primary)\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"48 53 68 30 68 68\" fill=\"none\" stroke=\"#F0641F\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg>\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;line-height:0.95;letter-spacing:0.01em;text-transform:uppercase;color:#FFFFFF;\">Miles<br>Mechanical<span style=\"display:block;font-size:12px;font-weight:600;letter-spacing:0.24em;color:#93B8D9;margin-top:6px;\">AC &amp; HEATING<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Variants row -->\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:16px;\">\n        <div style=\"background:var(--c-panel);border:1px solid var(--c-border);border-radius:6px;padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:150px;\">\n          <svg width=\"56\" height=\"56\" viewBox=\"0 0 96 96\" fill=\"none\"><rect x=\"2\" y=\"2\" width=\"92\" height=\"92\" rx=\"14\" fill=\"#155C93\"><\u002Frect><polyline points=\"28 68 28 30 48 53\" fill=\"none\" stroke=\"#FFFFF y:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:150px;\">\n          <svg width=\"60\" height=\"40\" viewBox=\"0 0 96 64\" fill=\"none\"><polyline points=\"28 52 28 14 48 37\" fill=\"none\" stroke=\"var(--c-primary)\" stroke-width=\"11\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"48 37 68 14 68 52\" fill=\"none\" stroke=\"#F0641F\" stroke-width=\"11\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg>\n          <span style=\"font:600 12px/1 'IBM Plex Sans',sans-serif;color:var(--c-muted);letter-spacing:0.04em;\">Mark, no badge<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Clearance + misuse -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;\">\n        <div style=\"background:var(--c-panel);border:1px solid var(--c-border);border-radius:6px;padding:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;\">\n          <div style=\"position:relative;padding:54px;border:1px dashed var(--c-primary);border-radius:4px;\">\n            <div style=\"padding:22px;border:1px dashed var(--c-ember);border-radius:4px;\">\n              <svg width=\"64\" height=\"64\" viewBox=\"0 0 96 96\" fill=\"none\"><rect x=\"2\" y=\"2\" width=\"92\" height=\"92\" rx=\"14\" fill=\"#155C93\"><\u002Frect><polyline points=\"28 68 28 30 48 53\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><polyline points=\"48 53 68 30 68 68\" fill=\"none\" stroke=\"#F0641F\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font:600 12px/1 'IBM Plex Sans',sans-serif;color:var(--c-muted);margin-top:18px;letter-spacing:0.04em;\">Minimum clearance = ½ the mark's height on all sides<\u002Fspan>\n        <\u002Fdiv>\n 0px;font-size:13px;color:var(--c-body);\"><span style=\"width:22px;height:22px;border-radius:3px;background:#D81E2C;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex:none;\">×<\u002Fspan> Place on busy photos w/o scrim<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===================== COLOUR ===================== -->\n    <section data-screen-label=\"Colour\" style=\"margin-top:104px;\">\n      <p style=\"margin:0 0 10px;font:600 13px/1 'IBM Plex Sans',sans-serif;letter-spacing:0.18em;text-transform:uppercase;color:var(--c-ember);\">02 — Colour<\u002Fp>\n      <h2 style=\"margin:0;font-family:'Archivo',sans-serif;font-weight:800;font-size:52px;line-height:1;letter-spacing:-0.01em;text-transform:uppercase;color:var(--c-ink);\">Two temperatures<\u002Fh2>\n      <div style=\"width:64px;height:4px;background:var(--c-ember);border-radius:2px;margin-top:20px;\"><\u002Fdiv>\n      <p style=\"margin:24px 0 0;font-size:18px;line-height:1.6;color:var(--c-body);max-width:70ch;\"><strong>Miles Blue<\u002Fstrong> is the brand — calm, trustworthy, the cooling side. <strong>Ember<\u002Fstrong> is the warm counterpart for heating moments and key calls-to-action. Steel neutrals carry most of every page; colour is the seasoning, not the meal. <strong>Alarm red<\u002Fstrong> is reserved exclusively for emergency service.<\u002Fp>\n\n      <h3 style=\"margin:48px 0 16px;font:600 13px/1 'IBM Plex Sans',sans-serif;letter-spacing:0.16em;text-transform:uppercase;color:var(--c-muted);\">Miles Blue · primary / cooling<\u002Fh3>\n      <div style=\"display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--c-border);\">\n        <sc-for list=\"{{ blue }}\" as=\"s\" hint-placeholder-count=\"10\">\n          <div style=\"flex:1;background: {{ s.hex }};min-height:104px;padding:16px 12px;display:flex;flex-direction:column;justify-content:space-between;\">\n            <span style=\"font:700 12px/1 'IBM Plex Sans',sans-serif;color: {{ s.fg }};\">{{ s.step }}<\u002Fspan>\n            <span style=\"font:500 10px/1.3 'IBM Plex Mono',monospace;color: {{ s.fg }};opacity:0.82;\">{{ s.hex }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"margin:10px 0 0;font:500 12px/1 'IBM Plex Mono',monospace;color:var(--c-muted);\">--mm-blue-600 · #155C93 — primary action, links, brand surfaces<\u002Fp>\n\n      <h3 style=\"margin:40px 0 16px;font:600 13px/1 'IBM Plex Sans',sans-serif;letter-spacing:0.16em;text-transform:uppercase;color:var(--c-muted);\">Ember · heating / warm accent<\u002Fh3>\n      <div style=\"display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--c-border);\">\n        <sc-for list=\"{{ ember }}\" as=\"s\" hint-placeholder-count=\"8\">\n          <div style=\"flex:1;background: {{ s.hex }};min-height:104px;padding:16px 12px;display:flex;flex-direction:column;justify-content:space-between;\">\n            <span style=\"font:700 12px/1 'IBM Plex Sans',sans-serif;color: {{ s.fg }};\">{{ s.step }}<\u002Fspan>\n            <span style=\"font:500 10px/1.3 'IBM Plex Mono',monospace;color: {{ s.fg }};opacity:0.82;\">{{ s.hex }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"margin:10px 0 0;font:500 12px/1 'IBM Plex Mono',monospace;color:var(--c-muted);\">--mm-ember-600 · #DD4E16 — heating accents, highlights, secondary CTAs<\u002Fp>\n\n      <h3 style=\"margin:40px 0 16px;font:600 13px/1 'IBM Plex Sans',sans-serif;letter-spacing:0.16em;text-transform:uppercase;color:var(--c-muted);\">Steel · neutral (dominant tone)<\u002Fh3>\n      <div style=\"display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--c-border);\">\n        <sc-for list=\"{{ steel }}\" as=\"s\" hint-placeholder-count=\"10\">\n          <div style=\"flex:1;background: {{ s.hex }};min-height:104px;padding:16px 12px;display:flex;flex-direction:column;justify-content:space-between;\">\n            <span style=\"font:700 12px/1 'IBM Plex Sans',sans-serif;color: {{ s.fg }};\">{{ s.step }}<\u002Fspan>\n            <span style=\"font:500 10px/1.3 'IBM Plex Mono',monospace;color: {{ s.fg }};opacity:0.82;\">{{ s.hex }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"margin:10px 0 0;font:500 12px/1 'IBM Plex Mono',monospace;color:var(--c-muted);\">--mm-steel-700 · #303E4B — body text · --mm-steel-900 headings · --mm-steel-200 borders<\u002Fp>\n\n      <h3 style=\"margin:40px 0 16px;font:600 13px/1 'IBM Plex Sans',sans-serif;letter-spacing:0.16em;text-transform:uppercase;color:var(--c-muted);\">Semantic<\u002Fh3>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n        <sc-for list=\"{{ semantic }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"border:1px solid var(--c-border);border-radius:6px;overflow:hidden;\">\n            <div style=\"background: {{ s.hex }};height:72px;\"><\u002Fdiv>\n            <div style=\"padding:14px 16px;\">\n              <p style=\"margin:0;font:700 14px/1.2 'IBM Plex Sans',sans-serif;color:var(--c-ink);\">{{ s.name }}<\u002Fp>\n              <p style=\"margin:4px 0 0;font:500 12px/1 'IBM Plex Mono',monospace;color:var(--c-muted);\">{{ s.hex }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===================== THEMING ===================== -->\n    <section data-screen-label=\"Theming\" style=\"margin-top:104px;\">\n      <p style=\"margin:0 0 10px;font:600 13px/1 'IBM Plex Sans',sans-serif;letter-spacing:0.18em;text-transform:uppercase;color:var(--c-ember);\">02b — Light &amp; dark<\u002Fp>\n      <h2 style=\"margin:0;font-family:'Archivo',sans-serif;font-weight:800;font-size:52px;line-height:1;letter-spacing:-0.01em;text-transform:uppercase;color:var(--c-ink);\">One brand, two modes<\u002Fh2>\n      <div style=\"width:64px;height:4px;background:var(--c-ember);border-radius:2px;margin-top:20px;\"><\u002Fdiv>\n      <p style=\"margin:24px 0 0;font-size:18px;line-height:1.6;color:var(--c-body);max-width:72ch;\">Every surface, text and border reads from one set of <code style=\"font-family:'IBM Plex Mono',monospace;font-size:15px;background:var(--c-border-2);padding:2px 6px;border-radius:4px;\">--c-*<\u002Fcode> custom properties. Flip <code style=\"font-family:'IBM Plex Mono',monospace;font-size:15px;background:var(--c-border-2);padding:2px 6px;border-radius:4px;\">data-theme<\u002Fcode> on the root and the whole site follows — try the toggle, top-right. Dark mode is built on the brand navy, not a generic grey, so the M monogram, Ember accents and alarm red stay true. This very document is themed by the same tokens.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px;\">\n        <div style=\"background:var(--c-card);border:1px solid var(--c-border);border-radius:6px;overflow:hidden;\">\n          <div style=\"background:#FFFFFF;padding:22px 24px;border-bottom:1px solid var(--c-border);\"><p style=\"margin:0;font:700 14px/1 'IBM Plex Sans',sans-serif;color:#0B2A45;display:flex;align-items:center;gap:9px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#155C93\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4.2\"><\u002Fcircle><path d=\"M12 2.5v2M12 19.5v2M4.6 4.6l1.4 1.4M18 18l1.4 1.4M2.5 12h2M19.5 12h2M4.6 19.4l1.4-1.4M18 6l1.4-1.4\"><\u002Fpath><\u002Fsvg>Light theme<\u002Fp><\u002Fdiv>\n          <div style=\"padding:18px 24px;display:flex;flex-direction:column;gap:10px;\">\n            <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:34px;height:34px;border-radius:5px;background:#FFFFFF;border:1px solid #DCE2E7;flex:none;\"><\u002Fspan><span style=\"font:600 13px/1.2 'IBM Plex Sans',sans-serif;color:var(--c-ink);\">Page / s
